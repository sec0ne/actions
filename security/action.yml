name: "Sec1 Security"
description: "Empower your CI/CD pipeline with Sec1 Security scans to fortify your applications against vulnerabilities."
author: "Secone Software Pvt. Ltd."
branding:
  icon: "shield"
  color: "orange"
inputs:
  apikey:
    description: "Your Sec1 API Key for secure and seamless integration."
    required: true
  runSca:
    description: "Run SCA (FOSS) scan. Default: true."
    required: false
    default: "true"
  runSast:
    description: "Run SAST scan. Default: true."
    required: false
    default: "true"
  scanType:
    description: "Deprecated. Use runSca/runSast instead. Accepted values: foss | sast | both."
    required: false
  scanTag:
    description: "Tag to identify this scan. Defaults to the branch name."
    required: false
  scmUrl:
    description: "Override the SCM URL. Auto-detected from GitHub by default."
    required: false
  sastIncrementalScan:
    description: "Run SAST scan in incremental mode. Requires a baseline full scan on the Sec1 server. Default: false."
    required: false
    default: "false"
  asyncScan:
    description: "Fire-and-forget mode. Submit the scan and exit without waiting for results. Ignored if a threshold is configured. Default: false."
    required: false
    default: "false"
  scanThreshold:
    description: "Threshold values for each severity (e.g., 'critical=1 high=5 medium=10 low=50'). Breach triggers the configured action."
    required: false
  actionOnThresholdBreached:
    description: "Action on threshold breach: fail | unstable | continue. 'unstable' emits a warning annotation but does not fail the build. Default: fail."
    required: false
    default: "fail"
  instanceUrl:
    description: "Custom Sec1 API URL. Default: https://api.sec1.io."
    required: false
  dashboardUrl:
    description: "Custom Sec1 Dashboard URL (used for report links). Default: https://unified.sec1.io."
    required: false
outputs:
  reportUrl:
    description: "URL of the Sec1 scan report."
  critical:
    description: "Number of critical vulnerabilities found."
  high:
    description: "Number of high vulnerabilities found."
  medium:
    description: "Number of medium vulnerabilities found."
  low:
    description: "Number of low vulnerabilities found."
  totalCve:
    description: "Total number of vulnerabilities found."
  scanStatus:
    description: "Final scan status: COMPLETED | SUBMITTED | FAILED."
runs:
  using: "docker"
  image: "docker://us-central1-docker.pkg.dev/cve-buster/sec1-public-repo/sec1-foss-security:v3"
  env:
    SEC1_INTEGRATION_NAME: GITHUB_ACTIONS
    SEC1_API_KEY: ${{ inputs.apikey }}
    SEC1_RUN_SCA: ${{ inputs.runSca }}
    SEC1_RUN_SAST: ${{ inputs.runSast }}
    SEC1_SCAN_TYPE: ${{ inputs.scanType }}
    SEC1_SCAN_TAG: ${{ inputs.scanTag }}
    SEC1_SCM_URL: ${{ inputs.scmUrl }}
    SEC1_SAST_INCREMENTAL_SCAN: ${{ inputs.sastIncrementalScan }}
    SEC1_ASYNC_SCAN: ${{ inputs.asyncScan }}
    SEC1_SCAN_THRESHOLD: ${{ inputs.scanThreshold }}
    SEC1_THRESHOLD_ACTION: ${{ inputs.actionOnThresholdBreached }}
    SEC1_INSTANCE_URL: ${{ inputs.instanceUrl }}
    SEC1_DASHBOARD_URL: ${{ inputs.dashboardUrl }}
