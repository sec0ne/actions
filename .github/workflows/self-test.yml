name: Self-test (manual)

# Run this manually from the Actions tab to validate the action against a real
# Sec1 instance before merging changes. Uses the local action via `./security`
# so it always reflects the code on the branch this workflow runs on.
#
# Prerequisites:
#   - Secret SEC1_API_KEY set on the repository.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which scenario to run"
        type: choice
        required: true
        default: sca-only
        options:
          - sca-only
          - sast-only
          - both
          - async-sca
          - threshold-fail
          - threshold-unstable
          - threshold-continue
          - custom-tag-and-scmurl
          - legacy-scanType-sast
      target:
        description: "Repo to scan (full URL)"
        type: string
        required: false
        default: https://github.com/sec0ne/sca-java-test-vulnado

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- SCA only ---------------------------------------------------------
      - name: SCA only
        if: inputs.scenario == 'sca-only'
        id: sca-only
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "true"
          runSast: "false"
          scmUrl: ${{ inputs.target }}

      # --- SAST only --------------------------------------------------------
      - name: SAST only
        if: inputs.scenario == 'sast-only'
        id: sast-only
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "false"
          runSast: "true"
          scmUrl: ${{ inputs.target }}

      # --- Both SCA + SAST (default) ----------------------------------------
      - name: Both SCA + SAST
        if: inputs.scenario == 'both'
        id: both
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          scmUrl: ${{ inputs.target }}

      # --- Async SCA (fire-and-forget, expect SUBMITTED status) -------------
      - name: Async SCA
        if: inputs.scenario == 'async-sca'
        id: async-sca
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "true"
          runSast: "false"
          asyncScan: "true"
          scmUrl: ${{ inputs.target }}

      # --- Threshold action=fail (expect step to fail) ----------------------
      - name: Threshold fail (expect this step to FAIL)
        if: inputs.scenario == 'threshold-fail'
        id: thr-fail
        continue-on-error: true     # so the workflow continues for inspection
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "true"
          runSast: "false"
          scanThreshold: "critical=1"
          actionOnThresholdBreached: "fail"
          scmUrl: ${{ inputs.target }}
      - name: Verify threshold-fail outcome
        if: inputs.scenario == 'threshold-fail'
        run: |
          echo "Outcome was: ${{ steps.thr-fail.outcome }}"
          if [ "${{ steps.thr-fail.outcome }}" != "failure" ]; then
            echo "::error::Expected threshold-fail step to FAIL but it did not."
            exit 1
          fi
          echo "OK - step failed as expected."

      # --- Threshold action=unstable (expect step PASS + warning annotation)
      - name: Threshold unstable (expect PASS with warning)
        if: inputs.scenario == 'threshold-unstable'
        id: thr-unstable
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "true"
          runSast: "false"
          scanThreshold: "critical=1"
          actionOnThresholdBreached: "unstable"
          scmUrl: ${{ inputs.target }}

      # --- Threshold action=continue (expect step PASS, no warning) ---------
      - name: Threshold continue (expect PASS)
        if: inputs.scenario == 'threshold-continue'
        id: thr-continue
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "true"
          runSast: "false"
          scanThreshold: "critical=1"
          actionOnThresholdBreached: "continue"
          scmUrl: ${{ inputs.target }}

      # --- Custom tag + scmUrl override -------------------------------------
      - name: Custom tag + scmUrl
        if: inputs.scenario == 'custom-tag-and-scmurl'
        id: custom-tag
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          runSca: "true"
          runSast: "false"
          scanTag: "self-test-${{ github.run_id }}"
          scmUrl: ${{ inputs.target }}

      # --- Legacy scanType=sast back-compat ---------------------------------
      - name: Legacy scanType=sast
        if: inputs.scenario == 'legacy-scanType-sast'
        id: legacy
        uses: ./security
        with:
          apikey: ${{ secrets.SEC1_API_KEY }}
          scanType: "sast"
          scmUrl: ${{ inputs.target }}

      # --- Aggregate outputs into the run summary ---------------------------
      - name: Show outputs
        if: always()
        run: |
          echo "## Self-test outputs" >> $GITHUB_STEP_SUMMARY
          echo "scenario: ${{ inputs.scenario }}" >> $GITHUB_STEP_SUMMARY
          echo "target:   ${{ inputs.target }}" >> $GITHUB_STEP_SUMMARY
          for s in sca-only sast-only both async-sca thr-fail thr-unstable thr-continue custom-tag legacy; do
            url="$(jq -r --arg s "$s" '.[$s].outputs.reportUrl // empty' <<<'${{ toJSON(steps) }}')"
            if [ -n "$url" ]; then
              echo "- $s reportUrl: $url" >> $GITHUB_STEP_SUMMARY
            fi
          done
